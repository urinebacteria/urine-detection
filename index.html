<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI尿液細菌辨識系統</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- 標題區 -->
      <div class="header">
        <h1 class="title">
          <span class="title-zh"
            >設計思考與體驗式學習融合之智慧醫療系統產品整合設計與建構</span
          >
          <span class="title-en"
            >Integrated Design and Development of Smart Healthcare Systems: A
            Convergence of Design Thinking and Experiential Learning</span
          >
        </h1>
      </div>

      <!-- 主要內容區 -->
      <div class="content">
        <!-- 左欄：攝影機畫面 -->
        <div class="video-section">
          <div class="video-container">
            <!-- 電腦鏡頭即時畫面 -->
            <video
              id="videoElement"
              autoplay
              playsinline
              style="
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                z-index: 1;
              "
            ></video>
            <!-- Canvas 保留給 TF.js 擷取畫面用（隱藏） -->
            <canvas id="webcam-canvas" style="display: none"></canvas>

            <!-- 狀態顯示（左上角） -->
            <div class="video-overlay">
              <div class="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text" id="status">等待中…</span>
              </div>
              <!-- 模型名稱（右上角） -->
              <div class="model-badge" id="modelName">模型未載入</div>
            </div>
          </div>
        </div>

        <!-- 右欄：辨識結果 + 細菌介紹（分兩個框） -->
        <div class="right-section">
          <!-- 框1：辨識結果 -->
          <div class="results-section">
            <div class="results-header">
              <h2>辨識結果</h2>
            </div>
            <div class="results-list" id="list"></div>
          </div>

          <!-- 框2：細菌介紹 -->
          <div class="info-section">
            <div class="results-header">
              <h2>細菌介紹</h2>
            </div>
            <div class="info-content" id="infoContent">
              <div class="info-empty">
                <p>尚未偵測到細菌</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./tensor/tf.min.js"></script>
    <script src="script.js" defer></script>
  </body>
</html>
